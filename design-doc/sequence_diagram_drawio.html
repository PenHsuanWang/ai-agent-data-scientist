<!DOCTYPE html>

    <title>Data Scientist AI Agent - Sequence Flow</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: #f6f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
        }
        .diagram-container {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 30px;
            /* Grid background simulating drawio */
            background-image: 
                linear-gradient(to right, #f0f4f8 1px, transparent 1px),
                linear-gradient(to bottom, #f0f4f8 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: auto;
        }
        svg {
            display: block;
            background: transparent;
        }
        text {
            font-family: inherit;
        }
        .title-box {
            fill: #ffffff;
            stroke: #d0d7de;
            stroke-width: 1.5;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        .actor-box {
            stroke-width: 1.5;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.06));
        }
        .lifeline {
            stroke: #8b949e;
            stroke-width: 1.5;
            stroke-dasharray: 6 5;
        }
        .activation {
            stroke-width: 1.5;
        }
        .msg-line {
            stroke: #24292f;
            stroke-width: 1.5;
        }
        .msg-line-dashed {
            stroke: #24292f;
            stroke-width: 1.5;
            stroke-dasharray: 5 4;
        }
        .msg-text {
            font-size: 13px;
            fill: #24292f;
        }
        .msg-text-alt {
            font-size: 12px;
            fill: #d79b00;
            font-weight: 600;
        }
        .msg-text-action {
            font-size: 12px;
            fill: #1e40af;
            font-family: monospace;
        }
        .loop-frame {
            fill: rgba(213, 232, 212, 0.15);
            stroke: #82b366;
            stroke-width: 2;
            rx: 6;
        }
        .loop-header {
            fill: #d5e8d4;
            stroke: #82b366;
            stroke-width: 1.5;
        }
        .iter-box {
            fill: #ffffff;
            stroke: #82b366;
            stroke-width: 1;
            rx: 4;
        }
        .data-box {
            fill: #ffffff;
            stroke: #d79b00;
            stroke-width: 1;
            rx: 4;
        }
        .inner-box {
            fill: #ffffff;
            stroke: #24292f;
            stroke-width: 1;
            rx: 4;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.03));
        }
        .note-box {
            fill: #fffbdd;
            stroke: #d79b00;
            stroke-width: 1.5;
            rx: 6;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.05));
